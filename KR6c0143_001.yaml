body:
  text: 唐三藏法師玄奘譯經唐大慈恩寺沙門靖邁撰疏夫至理沖微蹄識修泯五眼夷鑑四智昧聆豈以寢疾寄無說表玄告滅訖不言彰妙然真俗雖殊無相不異動靜爰隔離言斯同同未始異異未始同未始異同自同同異未始同異自異異同異自異異異不異同同自同同同不同異同異未嘗一真俗未詎殊而惑者言同即謂同其異言異即謂異其同遍計於是乎增益圓成以之而損減致使若水洪瀉壞襄庶物惑火炎熾流灼羣品惟無上法王欲屏茲霄沴斡圓鏡以幽燭朗大明於玄冥故使境不滯心心無纍境境不滯心境無相也心無纍境心非見也是以至人用無見之妙慧照無相之真境心境未始異緣照未曾同亡庶執於滯情夷物我於積慮無上神呪其在茲乎言般若者唐言淨慧言波羅者唐言彼岸言蜜多者唐稱為到然慧之與岸名相本淪豈復染淨彼此可得寄美般若強言之矣遠相離邊是以言心故經說云如衆生心識體雖是有而無長短青黃等相又曰是身為城心王處中故今舉之以顯中實也然以慧為名者盡其照也以岸為稱者極其功也以心為目者窮其實也照之不盡不足以朗大明於種覺功其不極未可以敞幽室於玄都實之不窮安足以冥有無一真俗也文約義包詞華旨妙括羣籍之幽致握庶典之玄樞所以三藏諷味襟抱往還遐阻仗之無纍此雖先譯而經目遺文今茲重翻於以無惑邁以志學爰即諷持暨今耳順罔敢由贊敬因心玩聊措短懷非敢傳燈以慕來津將解此經略為四句分別一明始無如是終闕奉行所由二明說般若意三明教之宗旨四分文解釋第一先明始無如是終闕奉行所由問尋夫玄籍格言羣經靡異首置如是等說末繫奉行之言遂使詳習之致剋諧無盡之燈恆照是以泥越之際尚纍茲人辨修多羅故頌此旨唯今至典始無如是之說終闕奉行之言其故何也答原夫鹿苑桴玄沖文未肆於貝疊鵠林掩駕羣聖方汗於金篇故使八萬法藏奏希音於五天十二真詮擊玄旨於九有然夫綜括衆經大格唯二一鳩羣會之說如華嚴阿含等二纂一會之談如涅槃法華等其餘列行之典或從多會經出則始有如是終具奉行如仁王十地等或從一會經來則始無如是終闕奉行如觀音遺教等今此經者從摩訶般若一會所流是以始無如是終闕奉行矣第二明說般若意意為破除遍計所執夫羣生所以隔塵勞之山沈煩惑之海者莫不皆由人法遍計之所纍矣故中論曰有人言萬物從大自在天生或韋紐天生或世性生自然生及種種說我及有我所如是等無量謬執墮於無因及以邪因斷常等見不知正法欲斷如是諸邪見等令知佛法以大乘法說因緣相所謂一切法不生不滅畢竟空無如般若波羅蜜中說佛告須菩提菩薩坐道場時觀十二因緣如虗空不可盡既欲以大乘法說因緣相因緣相者即依他所起性及圓成實性此之二性心言性相一切永亡而羣生惑倒於中迷謬起於人法遍計所執而此所執本來是無故言不生不滅畢竟空無問依他起性可是因緣圓成實性如何亦稱為因緣耶答寄因緣門以明義故雖真如實際亦說因緣以圓成實不離因緣故又智度論問曰何因緣故說般若耶譬如須彌山王及以大地不以無事及小因緣而動今佛有何大事而說般若答為欲宣說菩薩行故為酬梵王先所請故為斷衆生諸疑結故一切衆生為結使病之所惱亂無始已來無人治者常為外道邪師所誤佛為醫王說般若藥而以療之為拔彼諸衆生等出於二邊入中道故說般若又為長爪諸梵志等於佛法中生信心故又說諸法之實相故為如是等種種大事故說般若波羅蜜經第三明教之宗旨謂以般若實相為宗般若即依他起性實相即圓成實性遍計所執一向是無如龜毛兔角是故經云無生無滅畢竟空無等依他起性俗諦故有勝義故無雖言俗有性相名字畢竟亦無勝義性者心言性相本自無矣為遣俗有假於勝義而以除之俗有既夷勝義亦泯斯之二性可以智冥難以情慮是以般若實相境平等然夫法絶羣境聖泯衆知絶羣境故於外無緣泯衆知故於內無取於外無緣於內無取則內外兩冥心境俱寂復何寄於真俗哉欲言其有無狀無形欲言其無聖以之靈夫言真俗如如實際法性實相者強謂之矣第四分文解釋就此文中總分為二先略後廣略中有四初一明造修之者二行深般若下明習應之慧三照見五蘊下明契證之境四度一切苦厄下明理圓剋果二舍利子下重廣分別觀自在菩薩就略說之中先解第一造修之者言觀自在菩薩者蓋是登地已上諸大士等通有此德非止彌陀之左輔也何以明之茲法造修出在大般若習應品中佛對舍利子明諸菩薩習行般若應當思惟菩薩及佛般若五蘊等一切諸法但有名字如我衆生皆不可得以其空故此謂一切入地菩薩習行般若應思惟觀察世出世等一切諸法但有隨俗假立名字畢竟無有真俗性相以諸法相但是遍計所執畢竟空故由作此解觀諸法空於一切境無有壅礙故稱觀自在舊經曰觀世音音者即是音聲名字謂觀諸法但有隨俗假立音聲名字而已問何以得知作此習行是入地菩薩非地前邪答准經校量習行般若唯除佛慧餘悉不及故知非是地前明矣言菩薩者茲文略也若具梵言應曰菩提薩埵摩訶薩埵菩提唐稱為覺舊或翻道謬也問佛陀唐亦言覺故以菩提為道二名無濫殆得厥中何言謬耶答佛陀蓋取能證覺之者不取於覺菩提止取能證之覺不取於者覺名雖同者智不一豈可以末伽之道而譯夫菩提之覺乎是以真諦在果已鑑紕謬彰之攝論可不信歟薩埵唐言有情舊曰衆生誤也薄呼繕那唐言衆生有情衆生梵語全別不可濫翻也摩訶言大薩埵言有情謂覺有情大有情也覺是所求有情是能求覺者有情名通三乘故以大有情簡之顯非求中下乘覺有情也又覺是所求境有情是所為境謂具自他大願求於妙覺利有情故又薩埵者是勇猛義精進勇猛求於大覺故名菩提薩埵今為此方好略於菩下去提薩下除埵是以但言菩薩此通諸位今取地上應言摩訶薩而文無者為存略也行深般若波羅蜜多時第二明習應之慧言行深般若者夫大明無相妙慧無知無相故羣相已淪相所不能相無知故庶知由泯知所不能知雖知所不能知而圓鏡幽明鑑極法界雖相所不能相然散影三千埀形萬有斯可謂形於無知矣能形於無知者豈形知之能量哉是故經曰菩薩行般若時不念我行般若不行般若非不行般若菩薩如是行能為無量衆生而作益然亦不念有是益何以故是菩薩不見有法出法性者故如是行般若為最第一最尊最勝為無有上其為深者不亦宜乎照見五蘊等皆空此疏及基師幽贊均有等字他本無第三明契證之境言照見五蘊等皆空者色受想行識名為五蘊等取十二處十八界十二緣起四諦此之五種皆空故言等皆空也然此五蘊皆通因及果悉聚荷衆法而以成之故通名蘊此但聚荷事也外道諸邪執此五種各有實體又於五上或即或離計有自在運用之我今言等皆空者謂遍計所執一一蘊有實體性此執皆空又於此五若即若離我我所空所以稱皆是故經曰不見色若生相若滅相若垢相若淨相乃至識亦爾其性空故又曰不見色與受合乃至不見行與識合何以故無有法與非法合者其性空故此明二執皆空空中何有生滅合與不合度一切苦厄第四明理圓剋果言度一切苦者此明無餘依涅槃果謂達五蘊果空故所以能度生死苦果得無餘依涅槃也言度一切厄者此明有餘依涅槃果謂達五蘊因空故則度一切諸厄流等煩惱之縛此言厄者通謂一切煩惱皆能厄縛衆生非唯四厄也所以達蘊因果俱空言是涅槃者涅槃名解脫空等是解脫之門門已成所以苦厄便盡正證解脫也問入涅槃者通由無相無願何以唯言空耶答無執拒而擬則大方也夫空故無相無相故無願既言空矣則萬法玄同何憂乎二不空耶又以空為首故從可知矣夫托生在業緣空則生湮隱理由煩惑已則理顯今五蘊斯空苦厄云度契茲極滅故其然矣自下第二廣明般若文亦有四初約遣執以明般若二以無所得故下約就證果以明般若三故知般若下廣歎顯勝四即說呪下重結前經寄呪顯勝初約遣執以明般若中文復有二初明所執皆空二無智亦無得下明能證亦空就明所執空中法門無量今且約五門而以遣之其五者何一謂五蘊空二謂十二處空三謂十八界空四謂十二緣起空五謂四諦空遣此五門文即為五此中一一門皆通遣人法二種遍計所執如前已辨第一先約五蘊以明空其文有三初釋前見蘊空之所以二舍利子下釋前度一切苦厄所由三是故下牒初類後舍利子前中言舍利子者對揚之賓具依梵本應云舍利弗怛羅舍利者是鳥名舊翻為鸜鵒或云身三藏云並非也舍利鳥者即春鶯也似鸜鵒耳然此之鳥極為黠慧音聲變轉縱任自在其於衆鳥蔑以加也然此方目斯鳥其名不一不可的以一名當之故存本音耳弗怛羅唐的言子為之翻之舍利是其母名其母為性聰敏辨捷謂印度國方之於鶯因以名焉母先才哲雖復逾倫然與兄狗祉羅對論常屈於兄及懷此子兄常被屈暨于八歲凡所言論諸國論師莫有敵者時人以母聰穎今子更逾欲顯母子聰穎慧高羣哲故以母之嘉稱式標其譽問今所破顯執盡理顯斯蓋大士之職司非小學之尸務今命舍利子而為對揚豈不差根耶答諸佛所化菩薩名同復何怪人執二乘人執法情固然舍利子於二乘中智慧為最今親對佛知法性空類勵同乘達法無性不應執實又佛力加被令解空除執以勵不暨也色不異空空不異色色即是空空即是色受想行識亦復如是文中第一釋前見蘊空之所以何以故時衆疑云一切衆生悉皆見知色等五蘊是其實有今何以故言菩薩見空故今明遍計所執色等五蘊本來空無譬目熱眩而於空中現種種色此色與空一而無二遍計執色亦復如是煩惱熱眩於自心中有空現色而此色性與空不異都無所有故告舍利子言色不異空若色實有與空異者空中應有五蘊今諸菩薩以真實正智見遍計色蘊本自空無故言色不異空色既不異於空空復豈當而得異色故言空不異色既不相異所以言色即是空空即是色色之與空平等平等無有差別故知此色本來自空非是菩薩強觀使空若色實有不空菩薩強觀使空菩薩便成顛倒凡夫見實應非顛倒而實不爾故知色空受想行識等亦復如是者如色與空不二餘四蘊等理亦同然舍利子是諸法空相不生不滅不垢不淨不增不減第二釋前度一切苦厄所由正由色等五蘊畢竟同空無有生滅等故是故苦厄亦無故云度也就此文中凡約四門以顯同空所以度厄有人言色等諸法定性是有何以故是諸智人或謂色等諸法從自體生或謂從他生或謂自他共生或無因生種種說色等法生何故言空無有苦厄故今佛告舍利子是色等諸法但有空相而無有生汝若言色等諸法從自體生則一法有二體所以然者若直一體則無有生若言從自體生則有自體為能長生復有所從生故有二體若能生之自體復有所從生所從生無窮若能生自體無所從生生則無從生若無從生則無自體生若無自體生是無自性生自性生無故他性生亦無何以故因自性故有他性於他亦無是自性今自性無故他性亦無是故不應從他生若自他性俱無則無共生若言無因生是則不可何以故有因生尚已破壞況復無因而能有生若無因而有生者布施持戒應墮地獄十惡五逆應當生天以俱無因故若實有色等生可說有滅今既無色等生則亦無滅遍計所執色等自性生滅俱無非空如何本為有色等所以有苦厄今若色等既空是以苦厄斯度二遣垢淨門以顯色等同空之相有人云現見有漏諸染色等從垢因緣生無漏諸淨色等從無染因緣得是則色等諸法有垢有淨既有垢淨則為不空何得而言色等諸法同於空耶故中觀論云若謂緣無果而從緣中出是果何不從非緣中而出如泥中無瓶何不從乳中出若必一向無果無垢無淨無有苦厄則無凡聖有大邪見過答子徒以熱眩之目覩乎空華而豈知夫華即空哉故中觀云果從衆緣生是緣無自性緣若無自性是緣則非有緣自體既無何能生於果是故色等垢淨諸果不從緣生亦不從非緣生以緣尚不能生非緣何能生若非緣而能生果者造善應墮地獄造惡應得生天以非緣故既色等諸法不從二生是則無色等以無色等故緣非緣亦無又智度論曰若法不生不滅如虗空云何有垢有淨譬如虗空雖萬歲雨而亦不濕雖大火燒而亦不熱何以故本自無故謂遍計所執色等本無故不說垢淨垢淨既無何有苦厄三遣增減門以顯色等同空之相有人云現見色等從因緣故增細成粗從因緣故減粗為細既從因緣增減可得是則不空何為而言色等皆空度一切苦厄答若子之所見其如煩惱渴愛而覩陽𦦨為水水豈實哉蓋即空也故攝大乘為對除增益散動是故經言色自性空等謂遍計所執色等論其自性永無有故既色等永無云何可說增細成粗減粗為細也既無增減何有苦厄故言度一切苦厄也自下第三牒初類後文即為二先牒初二無眼耳下是類後是故空中無色無受想行識此牒初也彼前來以四門分別色等五蘊一向同空故當知十二處等下四門悉是遍計所執皆亦是空所以然者一切依他所起之性及圓成實性本離名言分別之相謂諸賢聖人為令有情有所趣入遂於二性諸法假施客名其所施客名互相遮異而已論其客名畢竟不能目法自性也又此二性諸法既離性相一切心行所不能緣然諸有情不達名言是客計為定實又不達諸法無有性相計有定實性相為心所行如是妄計定實名相並是遍計所執畢竟是無如石女兒及龜毛等為此義故說之為空遍計所執色等既空所以十二處等下四門遍計所執理亦同無眼耳鼻舌身意無色聲香味觸法第二類十二處空所以十二通名處者此之十二一一皆能與識作生長之門是故名處又此十二各各有相差別之義所以名處言十二者謂六根處即眼根處乃至意根處及六塵處即色塵處乃至法塵處具如經列眼以見色為義乃至法以意所行為義如此客名皆假施說然諸異生不達虗假而於其中計有定實名義自性及以差別名遍計所執即此十二遍計所執本來是空所以稱無故言無眼耳等乃至無色聲等無眼界乃至無意識界第三類十八界空所以十八通名界者種子義故謂阿賴耶識中諸法種子說名為界界是因義故又能持自性及能持因果性義故名為界又攝持一切法差別義故名為界謂地等一切諸界雖差別無量皆十八攝言十八者謂六根界即眼界乃至意界及六塵界即色塵界乃至法塵界如處中說并六識界即眼識界乃至意識界此之十八名義自性及以差別但假施說而諸異生計有定實名義自性及以差別如是十八遍計所執本來是空所以稱無故言無眼界乃至無意識界也無無明亦無無明盡乃至無老死亦無老死盡第四類十二緣起空此之十二待緣而起故名緣起言十二者謂無明行識及名色六處觸受愛取與有生老死此之十二界攝有四義謂於因時有能引所引於果時有能生所生言因時能引者謂無明行識緣起未生故於今現在薰習阿賴耶識心能引無始名言名色六處觸受等種子使有感果之功言因時所引者謂名色六處觸受等種子由前無明等薰心習氣力故能令當來名色前後相依次第生起種子得增長故言果時能生者謂愛取有於命終位將與異熟隨順貪欲隨一業習氣現前有故能令前所引名色等感異熟言果時所生者謂生老死由前能生隨順貪欲隨一業習氣現前有故隨於一生衆同分中如先所引名色等異熟生起名生老死然此十二緣起有兩種順次第有兩種逆次第今此文意但明兩種順次第一謂雜染順次第謂無明緣行乃至生緣老死二清淨順次第謂無明滅故行滅乃至生滅故老死滅若於此兩種染淨十二緣起執有定實名義自性及以差別名遍計所執今達此雜染十二緣遍計所執皆空故言無無明乃至無老死又達此清淨十二緣遍計所執皆空故言無無明盡乃至無老死盡盡即滅也無苦集滅道第五類四諦空所以此四通名諦者審實不虗是故名諦言苦諦者謂有情生及生所處如是二種由業煩惱力所生故業煩惱增上起故如其次第顯前二種俱是苦性故名苦諦言集諦者謂諸煩惱增上所生諸業俱說名集由此二種而能集起生死苦故故名集諦言滅諦者謂所緣真如境上有漏法滅故言滅諦名道諦者謂諸無漏戒定慧等知苦斷集證滅修道運用無壅故名道諦若於此四執有定實名義自性及以差別名遍計所執今達此四遍計所執一切皆空故言無苦集滅道上來第一明所執皆空無智亦無得第二明能證亦空言無智者謂能觀智空言無得者謂所空境空初言無智者謂能觀蘊處等般若本離名言及以性相若執般若以為定實此亦即是遍計所執今遣此定性之智為空故言無智言無得者謂蘊處等遍計所執本來自空非由菩薩強觀使空然後證得蘊處等空故言無得故大品經曰菩薩行般若時行亦不受不行亦不受非行非不行亦不受不受亦不受以般若自性不可得故又以一法性無所有不隨諸法行不受諸法相故又上來為破於蘊處等起定實遍計所執故借空以遣之恐人即以空為究竟所證得境故今遣之明此空者亦復非是所證得境故中觀論曰大聖說空法為離諸見故若復見於空諸佛所不化何以故本為有病借空以除有病既除空亦自止如雹摧草草死雹消若其不然捨有取無譬猶逃峰趣壑俱不免於患如何可自止上來寄就遣執約因門以明般若自下第二寄就顯證約果門以明般若因則無依無得果則無相無相般若未曾因果為化有情假作因果名說就此文中復有其二初明依般若故得涅槃二明依般若故得菩提此亦假言依般若得菩提耳以無所得故菩提薩埵依般若波羅蜜多故心無罣礙無罣礙故無有恐怖遠離顛倒夢想究竟涅槃前中又五初牒前起後故言以無所得故二明能依之人故言菩提薩埵三明所依般若四明開解脫門五正明契證解脫初三前已說第四明開解脫門無有罣礙者即空解脫門謂達諸法自他俱空則能觀之智不為有性之所罣礙也言無罣礙故無有恐怖者此明無相解脫門由證諸法自他俱空故則知諸法無相所以然者若不知諸法無相外為相礙內多恐怖若證諸法無相外不為相礙內則無有恐怖也遠離顛倒夢想者明無願解脫門由證法無性外不為相礙內無恐怖故達知諸法但是顛倒猶如夢想虗妄不實所以遠離不起願求也究竟涅槃者正明解脫果上空無相願但是所入解脫之門由此門故便能趨入究竟涅槃解脫之處也亦可無有罣礙明得法空由達法無性故智無滯礙無有恐怖明得人空由不計我故內無恐怖遠離顛倒者重牒人空遠離夢想者重牒法空由於二空通達無纍故能究竟證涅槃矣三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提第二明由依般若能證菩提文中有三初明能依之人前得涅槃寄就菩薩明從因至果今得菩提假就諸佛明果由因得此即影略互顯門也二依般若下明所依之般若三正明所得菩提菩提之言此翻為覺舊言道者謬也但覺通三乘二乘覺有上故以阿耨多羅言簡之阿此言無耨多羅言上三藐言正三言等菩提言覺謂無上正等覺也故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗故說般若波羅蜜多呪第三廣歎顯勝文中有三初四句正歎由依般若能治二執能證二果故故知般若是大神呪等夫為呪者以滅惡生善故能銷四魔怨敵故言是大神呪能破二種癡障故言是大明呪此二歎能滅惡一切善中無有過失故言是無上呪佛為衆聖中尊名為無等從般若生故般若名無等等是故經云諸佛所師所謂法也以法常故諸佛亦常此二歎能生善二能除下釋成歎意謂能除諸苦證二真實此事不虗故歎為神呪等三故說下結彼般若得名呪所由正由具前滅惡生善四義故說般若名之為呪即說呪曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶第四重舉前經歎以顯勝即名經為呪非於經外別有呪也其如六門陀羅尼呪還攝前經以為六門耳既以經為呪然諸經呪詞所有文字皆為諸佛菩薩威神力加被一一字句亦攝多義若翻就此方言字或增或減於義有闕誦無良驗為此不翻或別告鬼神及諸天傍生所有言音多非印度常詞是以不翻諸經中呪例悉不翻皆為此耳
